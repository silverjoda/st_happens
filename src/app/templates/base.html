<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Ship Happens{% endblock %}</title>
    <style>
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        margin: 0;
        background: #f4f4ef;
        color: #1f1f1f;
      }

      main {
        max-width: 720px;
        margin: 2rem auto;
        padding: 1.5rem;
        background: #ffffff;
        border: 1px solid #ddd9cf;
        border-radius: 8px;
      }

      h1 {
        margin-top: 0;
      }

      .error {
        margin-bottom: 1rem;
        padding: 0.75rem;
        border: 1px solid #c43824;
        background: #ffecea;
        color: #8f2418;
        border-radius: 6px;
      }

      label {
        display: block;
        margin-bottom: 1rem;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 0.55rem;
        margin-top: 0.35rem;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 0.65rem 1rem;
        background: #0a6a78;
        color: #ffffff;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ship Happens</h1>
      {% if error %}
        <div class="error" role="alert">{{ error }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
